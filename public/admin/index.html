<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Admin - Rezal Helwin Bramantara</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" defer></script>
    
    <!-- Custom Styles -->
    <style>
      :root {
        --emerald-500: #10b981;
        --emerald-600: #059669;
        --emerald-700: #047857;
        --bg-dark: #0a0a0a;
      }

      body {
        background: var(--bg-dark);
      }

      /* Loading Screen */
      #loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
        color: #10b981;
        font-family: 'Inter', sans-serif;
      }

      .loading-content {
        text-align: center;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(16, 185, 129, 0.2);
        border-top-color: #10b981;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .loading-text {
        color: #a1a1a1;
        font-size: 0.875rem;
      }

      .error-message {
        color: #ef4444;
        font-size: 0.875rem;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading">
      <div class="loading-content">
        <div class="spinner"></div>
        <p class="loading-text">Loading Blog Admin...</p>
      </div>
    </div>

    <!-- Decap CMS will auto-initialize with config.yml -->
    <script>
      // Wait for DOM and CMS to be ready
      window.addEventListener('DOMContentLoaded', () => {
        const loading = document.getElementById('loading');
        
        // Check if CMS is loaded after a short delay
        setTimeout(() => {
          if (typeof window.CMS === 'undefined') {
            loading.innerHTML = `
              <div class="loading-content">
                <p class="error-message">Error: Decap CMS failed to load.</p>
                <p style="color: #a1a1a1; font-size: 0.75rem; margin-top: 0.5rem;">
                  Please refresh the page or check your internet connection.
                </p>
              </div>
            `;
          } else {
            // CMS loaded successfully, hide loading
            loading.style.display = 'none';
          }
        }, 2000);
      });
    </script>
  </body>
</html>
