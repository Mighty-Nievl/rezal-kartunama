backend:
  name: git-gateway
  branch: main
  squash_merges: true

locale: id

site_url: https://rezal.online
display_url: https://rezal.online
logo_url: https://rezal.online/favicon.svg

media_folder: public/blog-covers
public_folder: /blog-covers

publish_mode: editorial_workflow

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    slug: '{{slug}}'
    editor:
      preview: true
    preview_path: blog/{{slug}}
    fields:
      - { name: title, label: Title, widget: string, required: true, hint: 'Judul artikel (gunakan Sentence case, bukan ALL CAPS)' }
      - { name: description, label: Description, widget: text, required: true, hint: 'Deskripsi singkat untuk SEO dan social media preview' }
      - { name: pubDate, label: 'Publication Date', widget: datetime, required: true, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false }
      - { name: tags, label: Tags, widget: list, required: false, field: { label: Tag, name: tag, widget: string }, hint: 'Tags untuk kategorisasi artikel', default: [] }
      - { name: categories, label: Categories, widget: list, required: false, field: { label: Category, name: category, widget: string }, default: [] }
      - { name: cover, label: 'Cover Image', widget: image, required: false, media_folder: public/blog-covers, public_folder: /blog-covers, hint: 'Gambar cover untuk artikel (optional)' }
      - { name: draft, label: Draft, widget: boolean, default: false, hint: 'Aktifkan jika artikel belum siap dipublish' }
      - { name: author, label: Author, widget: string, default: 'Rezal Helwin Bramantara', required: false }
      - { name: body, label: Content, widget: markdown, required: true, hint: 'Tulis konten artikel di sini. Support Markdown syntax.' }
